name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease

      - name: Sign APK with apksigner
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          # ── Step 1: Verify all secrets are configured ──
          for secret_name in SIGNING_KEYSTORE_BASE64 SIGNING_STORE_PASSWORD SIGNING_KEY_ALIAS SIGNING_KEY_PASSWORD; do
            val=$(eval echo "\$$secret_name")
            if [ -z "$val" ]; then
              echo "::error::Secret '$secret_name' is not configured in repo Settings → Secrets"
              exit 1
            fi
          done

          # ── Step 2: Decode keystore ──
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > bubbletranslate.jks
          if [ ! -s bubbletranslate.jks ]; then
            echo "::error::Decoded keystore is empty — check SIGNING_KEYSTORE_BASE64 value"
            exit 1
          fi

          # ── Step 3: Locate apksigner (preinstalled on ubuntu-latest) ──
          APKSIGNER="${ANDROID_HOME}/build-tools/34.0.0/apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            echo "::error::apksigner not found at $APKSIGNER"
            echo "Available build-tools:"
            ls -la "${ANDROID_HOME}/build-tools/" || true
            exit 1
          fi

          # ── Step 4: Find unsigned APK ──
          UNSIGNED=$(find app/build/outputs/apk/release -name "*.apk" -not -name "*-signed*" | head -1)
          if [ -z "$UNSIGNED" ]; then
            echo "::error::No unsigned APK found in app/build/outputs/apk/release/"
            find app/build/outputs/apk/release -type f | head -20
            exit 1
          fi
          echo "Unsigned APK: $UNSIGNED"

          # ── Step 5: Sign ──
          SIGNED="app/build/outputs/apk/release/app-release-signed.apk"
          "$APKSIGNER" sign \
            --ks bubbletranslate.jks \
            --ks-pass pass:"$SIGNING_STORE_PASSWORD" \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --key-pass pass:"$SIGNING_KEY_PASSWORD" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --out "$SIGNED" \
            "$UNSIGNED"

          # ── Step 6: Verify ──
          "$APKSIGNER" verify --verbose "$SIGNED"

          # ── Step 7: Rename with version ──
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          FINAL="app/build/outputs/apk/release/BubbleTranslate-${VERSION_NAME}-arm64-v8a.apk"
          rm -f "$UNSIGNED"
          mv "$SIGNED" "$FINAL"
          echo "Signed APK: $FINAL"

          # ── Step 8: Export for downstream steps ──
          echo "apk_path=$FINAL" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename "$FINAL")" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BubbleTranslate-arm64-v8a
          path: app/build/outputs/apk/release/BubbleTranslate-*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/BubbleTranslate-*.apk
          generate_release_notes: true
