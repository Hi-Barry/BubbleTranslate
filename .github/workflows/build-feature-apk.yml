name: Build Feature APK (debug)

on:
  push:
    branches:
      - feature
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned APK for testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with branch and commit
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          cp app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/BubbleTranslate-feature-${COMMIT_HASH}-arm64-v8a.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BubbleTranslate-feature-arm64-v8a
          path: app/build/outputs/apk/debug/BubbleTranslate-feature-*.apk
